# Single source of truth for the jagua-rs nesting worker's SQS contract (Rust packer).
# Java models generated by Modelina (npm run gen:async) into com.cutl.async.jagua.model.
# Worker-isolated. Wire is camelCase; numbers are BigDecimal. Never hand-edit generated models.
asyncapi: 3.0.0
info:
  title: cutl ⇄ jagua-rs (nesting)
  version: 1.0.0
  description: |
    Asynchronous 2D nesting/packing. cutl publishes a nesting request (parts + bin geometry);
    the jagua-rs worker packs them and streams back intermediate "improvement" responses and a
    final layout, each keyed by correlationId. A request with cancelled=true aborts a running job.
defaultContentType: application/json
servers:
  aws-sqs:
    host: sqs.eu-north-1.amazonaws.com
    protocol: sqs
    description: AWS SQS (queue names are environment-bound via sqs.queues.*).
channels:
  nestingRequest:
    address: ${SQS_NESTING_REQUEST_QUEUE}
    description: cutl → jagua-rs. Config key sqs.queues.nesting-queue-name.
    messages:
      NestingRequest:
        $ref: '#/components/messages/NestingRequest'
  nestingResponse:
    address: ${SQS_NESTING_RESPONSE_QUEUE}
    description: jagua-rs → cutl. Config key sqs.queues.nesting-response-queue-name.
    messages:
      NestingResponse:
        $ref: '#/components/messages/NestingResponse'
operations:
  sendNestingRequest:
    action: send
    channel:
      $ref: '#/channels/nestingRequest'
    summary: Dispatch a nesting job, or cancel one (NestingCalculationService).
  receiveNestingResponse:
    action: receive
    channel:
      $ref: '#/channels/nestingResponse'
    summary: Consume intermediate/final nesting layouts (SqsConsumerService.handleOrder).
components:
  messages:
    NestingRequest:
      name: NestingRequest
      contentType: application/json
      payload:
        $ref: '#/components/schemas/NestingRequest'
    NestingResponse:
      name: NestingResponse
      contentType: application/json
      payload:
        $ref: '#/components/schemas/NestingResponse'
  schemas:
    NestingRequest:
      type: object
      description: |
        No field is structurally required: a cancel message carries just correlationId +
        cancelled=true, while a nesting job omits `cancelled` (absent ⇒ false). For an actual
        nesting job the worker additionally requires binWidth, binHeight, spacing and a part
        source (a non-empty `parts` array, or a legacy svgUrl/svgBase64 + amountOfParts); a
        request missing those is rejected with an errorMessage response. None of these can be
        marked `required` because the same schema models both cancellation and nesting messages.
      properties:
        correlationId: { type: string }
        binWidth:
          type: number
          description: Sheet width (mm). Required for a nesting job; ignored when cancelled.
        binHeight:
          type: number
          description: Sheet height (mm). Required for a nesting job; ignored when cancelled.
        spacing:
          type: number
          description: Minimum separation between parts (mm). Required for a nesting job; ignored when cancelled.
        amountOfRotations:
          type: integer
          format: int32
          description: |
            Global rotation count to try. Absent or explicit null ⇒ the worker defaults to 8.
            (Cancellation messages send this as null.)
        cancelled:
          type: boolean
          description: |
            true ⇒ abort the running job for this correlationId; other fields ignored.
            Absent ⇒ false (a normal nesting request).
        maxFit: { type: boolean }
        maxSeconds:
          type: integer
          format: int32
          description: |
            Per-request solver wall-clock budget (s). The worker clamps this to a 600s
            ceiling (s.min(600)) — values above 600, and absence of the field, both yield
            the 600s default. It is NOT uncapped; the cap keeps a job inside the SQS
            visibility timeout so it is not redelivered.
        parts:
          type: array
          description: Multi-part job. When present and non-empty, takes precedence over the legacy single-SVG fields.
          items: { $ref: '#/components/schemas/NestingRequestPart' }
        bucket: { type: string }
        s3Prefix: { type: string }
        offcutPolicy: { $ref: '#/components/schemas/OffcutPolicy' }
        outputQueueUrl:
          type: string
          description: |
            Optional per-request override for the response queue. Absent ⇒ responses go to
            the environment-configured nestingResponse queue (SQS_NESTING_RESPONSE_QUEUE).
        svgUrl:
          type: string
          deprecated: true
          description: Legacy single-part source (S3 URL). Use `parts` instead. Paired with top-level amountOfParts.
        svgBase64:
          type: string
          deprecated: true
          description: Legacy single-part source (base64-encoded SVG). Use `parts` instead. Paired with top-level amountOfParts.
        amountOfParts:
          type: integer
          format: int32
          deprecated: true
          description: Legacy single-part copy count (paired with top-level svgUrl/svgBase64). Ignored when `parts` is set.
    NestingRequestPart:
      type: object
      required: [svgUrl, amountOfParts]
      properties:
        svgUrl:
          type: string
          description: S3 URL of this part's SVG. Required — the worker downloads it unconditionally.
        amountOfParts:
          type: integer
          format: int32
          description: Number of copies of this part to nest. Required.
        itemId:
          type: string
          description: Caller-supplied id echoed back on each placement. Optional; the worker defaults it when absent.
        allowedRotations:
          type: array
          description: Per-part grain constraint. Omitted when null ⇒ worker uses global amountOfRotations.
          items: { type: integer, format: int32 }
    OffcutPolicy:
      type: object
      description: Global offcut (деловая обрезь) policy. jagua sees only these numbers, no material identity.
      properties:
        minOffcutWidthMm:
          type: number
          description: Minimum reusable width (mm); narrower offcuts are discarded.
        minOffcutHeightMm:
          type: number
          description: Minimum reusable height (mm); shorter offcuts are discarded.
        shape: { $ref: '#/components/schemas/OffcutShape' }
        kerfMm: { type: number }
    NestingResponse:
      type: object
      required: [correlationId, partsPlaced, utilisation, improvement, final, timestamp]
      description: |
        Every response (improvement, final, or error) always carries correlationId,
        partsPlaced, utilisation, improvement, final and timestamp. An error response sets
        errorMessage with partsPlaced=0, utilisation=0, final=true and no SVG URLs/pages.
      properties:
        correlationId: { type: string }
        firstPageSvgUrl: { type: string }
        lastPageSvgUrl: { type: string }
        sheets: { type: integer, format: int32 }
        pageSvgUrls:
          type: array
          items: { type: string }
        pages:
          type: array
          items: { $ref: '#/components/schemas/NestingResponsePage' }
        partsPlaced: { type: integer, format: int32 }
        utilisation: { type: number }
        improvement:
          type: boolean
          description: true ⇒ intermediate improvement message (not the final layout).
        errorMessage: { type: string }
        final:
          type: boolean
          description: true ⇒ final layout. Wire field name is literally "final".
        timestamp: { type: integer, format: int64 }
    NestingResponsePage:
      type: object
      properties:
        pageIndex: { type: integer, format: int32 }
        utilisation: { type: number }
        svgUrl: { type: string }
        partsPlaced: { type: integer, format: int32 }
        placements:
          type: array
          items: { $ref: '#/components/schemas/NestingPlacement' }
        offcuts:
          type: array
          description: Free-space offcuts jagua found on this page. Absent on improvement messages.
          items: { $ref: '#/components/schemas/Offcut' }
    NestingPlacement:
      type: object
      properties:
        itemId: { type: string }
        partIndex: { type: integer, format: int32 }
        x: { type: number }
        y: { type: number }
        rotation: { type: number }
        centroidX: { type: number }
        centroidY: { type: number }
    OffcutShape:
      type: string
      description: |
        Detection geometry the worker runs.
        RECTANGLE = axis-aligned free rectangles; RECTANGLE_MERGED = those rectangles
        unioned into one rectilinear outline (plus holes); QUADRILATERAL = arbitrary
        free polygons following the real part edges.
      enum: [RECTANGLE, RECTANGLE_MERGED, QUADRILATERAL]
    OffcutKind:
      type: string
      description: |
        Discriminates the flat Offcut geometry: RECT carries x/y/width/height; POLY carries
        vertices (and optional holes).
      enum: [RECT, POLY]
    Offcut:
      type: object
      required: [kind]
      description: |
        A reusable free-space region as a single flat object tagged by `kind` (a plain field,
        NOT a JSON-Schema/Jackson polymorphic discriminator). The worker's wire is already flat:
        RECT ⇒ {"kind":"RECT", x, y, width, height}; POLY ⇒ {"kind":"POLY", vertices[, holes]}.
        Geometry fields are optional and populated per `kind`; `holes` is omitted when empty.
      properties:
        kind: { $ref: '#/components/schemas/OffcutKind' }
        x: { type: number }
        y: { type: number }
        width: { type: number }
        height: { type: number }
        vertices:
          type: array
          description: POLY exterior ring, CCW, open (no duplicated closing vertex).
          items: { $ref: '#/components/schemas/OffcutVertex' }
        holes:
          type: array
          description: POLY interior rings (holes where placed parts sit), CW, open. Omitted when empty.
          items:
            type: array
            items: { $ref: '#/components/schemas/OffcutVertex' }
    OffcutVertex:
      type: object
      properties:
        x: { type: number }
        y: { type: number }
